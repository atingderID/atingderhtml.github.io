<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#3b82f6">
<meta name="description" content="管理和預覽 HTML 筆記的工具">
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiSFRNTCDnmb3lnozhk4VlbEHSHsOqc2hvcnRfbmFtZSI6IkHSHsOqIEhUTUwgTW5hZ2VyIiwic2NvcGUiOiIuIiwic3RhcnRfdXJsIjoiLiIsImRpc3BsYXkiOiJzdGFuZGFsb25lIiwiYmFja2dyb3VuZF9jb2xvciI6IiMwZjE3MmEiLCJ0aGVtZV9jb2xvciI6IiMzYjgyZjYiLCJvcmllbnRhdGlvbiI6InBvcnRyYWl0In0=">
<title>📚 HTML 筆記管理器</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root { --sidebar-w: 300px; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; }
  #sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); }
  #preview-frame { border: none; width: 100%; height: 100%; }

  .note-card.active { background: #dbeafe; border-left: 4px solid #3b82f6; }
  .note-card:not(.active) { border-left: 4px solid transparent; }

  .dark body { background: #0f172a; color: #e2e8f0; }
  .dark header { background: #1e293b; border-color: #334155; }
  .dark #sidebar { background: #1e293b; border-color: #334155; }
  .dark .note-card:hover { background: #1e3a5f !important; }
  .dark .note-card.active { background: #1e3a5f !important; border-left-color: #60a5fa; }
  .dark #search { background: #0f172a; border-color: #475569; color: #e2e8f0; }
  .dark #search::placeholder { color: #64748b; }
  .dark #stats { border-color: #334155; color: #64748b; }
  .dark #tag-bar { border-color: #334155; }
  .dark .tag { background: #1e3a5f; color: #93c5fd; }
  .dark main { background: #0f172a; }
  .dark #preview-bar { background: #1e293b; border-color: #334155; }
  .dark #preview-title { color: #e2e8f0; }
  .dark #modal-box { background: #1e293b; color: #e2e8f0; }
  .dark #modal-box .border-b, .dark #modal-box .border-t { border-color: #334155; }
  .dark #modal-box label { color: #94a3b8; }
  .dark #modal-box input, .dark #modal-box textarea {
    background: #0f172a; border-color: #475569; color: #e2e8f0;
  }
  .dark #modal-box input::placeholder, .dark #modal-box textarea::placeholder { color: #475569; }
  .dark .empty-state { color: #475569; }
  .dark #note-list .empty-state { color: #475569; }
  .dark ::-webkit-scrollbar-thumb { background: #334155; }
  .dark .font-medium.text-gray-800 { color: #e2e8f0 !important; }
  .dark .text-gray-700 { color: #cbd5e1 !important; }
  .dark #selection-controls { background: #1e3a5f !important; }
  .dark #mode-buttons button { background: #4c1d95; }
  .dark #mode-buttons button:hover { background: #6d28d9; }

  #drop-zone.dragover { background: #eff6ff; border-color: #3b82f6; }
  
  #install-btn { padding: 8px 12px; background: #10b981; hover:background: #059669; color: white; border-radius: 8px; font-size: 13px; cursor: pointer; transition: background .2s; display: none; }
  #install-btn.show { display: inline-block; }
  
  @media (max-width: 768px) {
    #sidebar { position: fixed; left: -100%; top: 0; height: 100%; z-index: 50;
               transition: left .3s ease; width: 85vw; min-width: unset; }
    #sidebar.open { left: 0; }
    #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 40; }
    #overlay.show { display: block; }
  }
  .tag { display: inline-block; padding: 1px 8px; border-radius: 999px;
         font-size: 11px; background: #e0e7ff; color: #4338ca; margin: 1px; }
  #modal { display: none; position: fixed; inset: 0; z-index: 100;
           background: rgba(0,0,0,.5); align-items: center; justify-content: center; }
  #modal.show { display: flex; }
  #modal-box { background: #fff; border-radius: 12px; width: 90%; max-width: 640px;
               max-height: 90vh; display: flex; flex-direction: column; }
  #modal-content { overflow-y: auto; padding: 20px; flex: 1; }
  textarea { font-family: monospace; font-size: 13px; resize: vertical; }
  .empty-state { text-align: center; color: #9ca3af; padding: 48px 24px; }
  ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 5px; }
</style>
</head>
<body class="bg-gray-100 h-screen flex flex-col overflow-hidden">

<header class="bg-white border-b px-4 py-3 flex items-center gap-3 shrink-0 shadow-sm z-30">
  <button id="menu-btn" class="md:hidden p-1 rounded hover:bg-gray-100" onclick="toggleSidebar()">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
    </svg>
  </button>
  <span class="text-xl font-bold text-blue-600">📚</span>
  <span class="font-semibold text-gray-700 hidden sm:block">HTML 筆記管理器</span>
  <div class="flex-1"></div>
  <button id="dark-btn" onclick="toggleDark()" title="切換深色模式"
          class="p-2 rounded-lg hover:bg-gray-100 text-gray-500 transition text-lg">🌙</button>
  <button id="install-btn" onclick="installApp()" title="安裝到主畫面" class="bg-green-600 hover:bg-green-700 text-white text-sm px-3 py-1.5 rounded-lg transition">⬇ 安裝應用</button>
  <button onclick="openAddModal()" class="bg-blue-500 hover:bg-blue-600 text-white text-sm px-3 py-1.5 rounded-lg flex items-center gap-1 transition">
    <span class="text-lg leading-none">+</span> 新增筆記
  </button>
  <label class="bg-gray-100 hover:bg-gray-200 text-gray-600 text-sm px-3 py-1.5 rounded-lg cursor-pointer transition">
    📁 匯入
    <input type="file" accept=".html,.htm" multiple class="hidden" onchange="importFiles(this)">
  </label>
  <button onclick="exportAll()" title="備份所有筆記"
          class="bg-green-500 hover:bg-green-600 text-white text-sm px-3 py-1.5 rounded-lg transition">⬇ 備份</button>
  <label class="bg-purple-500 hover:bg-purple-600 text-white text-sm px-3 py-1.5 rounded-lg cursor-pointer transition" title="還原備份">
    ⬆ 還原
    <input type="file" accept=".json" class="hidden" onchange="importBackup(this)">
  </label>
</header>

<div class="flex flex-1 overflow-hidden relative">
  <div id="overlay" onclick="toggleSidebar()"></div>

  <aside id="sidebar" class="bg-white border-r flex flex-col h-full overflow-hidden shadow-md">
    <div class="p-3 border-b">
      <input id="search" type="text" placeholder="🔍 搜尋筆記標題或標籤…"
             class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"
             oninput="renderList()">
    </div>
    <div id="mode-buttons" class="px-3 py-2 border-b flex gap-2">
      <button onclick="enterSelectionMode()" class="text-xs flex-1 bg-indigo-500 hover:bg-indigo-600 text-white px-3 py-2 rounded transition font-medium">☑ 選取模式</button>
    </div>
    <div id="selection-controls" class="hidden px-3 py-2 border-b bg-blue-50 flex gap-2 flex-wrap">
      <button onclick="selectAll()" class="text-xs bg-blue-500 hover:bg-blue-600 text-white px-2 py-1 rounded transition">✓ 全選</button>
      <button onclick="deselectAll()" class="text-xs bg-gray-300 hover:bg-gray-400 text-gray-700 px-2 py-1 rounded transition">✕ 全不選</button>
      <button onclick="exitSelectionMode()" class="text-xs bg-gray-300 hover:bg-gray-400 text-gray-700 px-2 py-1 rounded transition">退出</button>
      <div class="flex-1"></div>
      <span id="selection-count" class="text-xs text-gray-600 self-center"></span>
      <button onclick="bulkExport()" class="text-xs bg-green-500 hover:bg-green-600 text-white px-2 py-1 rounded transition">⬇ 匯出</button>
      <button onclick="bulkDelete()" class="text-xs bg-red-500 hover:bg-red-600 text-white px-2 py-1 rounded transition">🗑 刪除</button>
    </div>
    <div id="tag-bar" class="px-3 py-2 border-b flex flex-wrap gap-1 min-h-[40px]"></div>
    <div id="note-list" class="flex-1 overflow-y-auto p-2"></div>
    <div id="stats" class="text-center text-xs text-gray-400 py-2 border-t"></div>
  </aside>

  <main class="flex-1 flex flex-col overflow-hidden bg-gray-50">
    <div id="preview-bar" class="hidden bg-white border-b px-4 py-2 flex items-center gap-2 shrink-0">
      <span id="preview-title" class="font-semibold text-gray-700 flex-1 truncate"></span>
      <button onclick="editCurrentNote()" class="text-sm text-blue-500 hover:underline">編輯</button>
      <button onclick="deleteCurrentNote()" class="text-sm text-red-400 hover:underline">刪除</button>
      <button onclick="exportCurrentNote()" class="text-sm text-gray-500 hover:underline">匯出</button>
    </div>
    <div id="empty-main" class="empty-state flex-1 flex flex-col items-center justify-center">
      <div class="text-6xl mb-4">📄</div>
      <div class="text-lg font-medium text-gray-400 mb-1">選擇一篇筆記來預覽</div>
      <div class="text-sm text-gray-300">或點擊「新增筆記」/「匯入」開始</div>
    </div>
    <iframe id="preview-frame" class="hidden flex-1" sandbox="allow-scripts allow-same-origin"></iframe>
  </main>
</div>

<div id="modal">
  <div id="modal-box">
    <div class="flex items-center justify-between px-5 py-4 border-b">
      <h2 id="modal-title" class="font-bold text-gray-800 text-lg">新增筆記</h2>
      <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-2xl leading-none">&times;</button>
    </div>
    <div id="modal-content">
      <div class="mb-3">
        <label class="block text-sm font-medium text-gray-600 mb-1">標題 <span class="text-red-400">*</span></label>
        <input id="m-title" type="text" placeholder="筆記標題"
               class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
      </div>
      <div class="mb-3">
        <label class="block text-sm font-medium text-gray-600 mb-1">標籤（逗號分隔）</label>
        <input id="m-tags" type="text" placeholder="例：JavaScript, 前端, ES6"
               class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300">
      </div>
      <div class="mb-1">
        <label class="block text-sm font-medium text-gray-600 mb-1">HTML 內容 <span class="text-red-400">*</span></label>
        <textarea id="m-html" rows="14" placeholder="貼上你的 HTML 筆記內容…"
                  class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-300"></textarea>
      </div>
    </div>
    <div class="flex justify-end gap-2 px-5 py-3 border-t">
      <button onclick="closeModal()" class="px-4 py-2 text-sm rounded-lg border hover:bg-gray-50">取消</button>
      <button onclick="saveNote()" class="px-4 py-2 text-sm rounded-lg bg-blue-500 hover:bg-blue-600 text-white">儲存</button>
    </div>
  </div>
</div>

<div id="drop-zone" class="hidden fixed inset-0 bg-blue-50/90 z-50 border-4 border-dashed border-blue-400 flex items-center justify-center text-blue-500 text-2xl font-bold">
  放開以匯入 HTML 筆記 📥
</div>

<script>
const STORAGE_KEY = 'html_notes_v1';
let notes = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let currentId = null;
let editingId = null;
let activeTag = null;
let deferredPrompt = null;
let selectionMode = false;
let selectedIds = new Set();

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(notes)); }
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// PWA Install Handling
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-btn').classList.add('show');
});

function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(choice => {
    if (choice.outcome === 'accepted') {
      document.getElementById('install-btn').classList.remove('show');
    }
    deferredPrompt = null;
  });
}

window.addEventListener('appinstalled', () => {
  document.getElementById('install-btn').classList.remove('show');
});

// Service Worker Registration
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('data:application/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCdpbnN0YWxsJywgZXZlbnQgPT4ge2NvbnNvbGUubG9nKCdTVyBpbnN0YWxsZWQnKTt9KTsgc2VsZi5hZGRFdmVudExpc3RlbmVyKCdhY3RpdmF0ZScsIGV2ZW50ID0+e2NvbnNvbGUubG9nKCdTVyBhY3RpdmF0ZWQnKTt9KTs=').catch(console.error);
}

let darkMode = localStorage.getItem('dark_mode') === '1';
function applyDark() {
  document.documentElement.classList.toggle('dark', darkMode);
  document.getElementById('dark-btn').textContent = darkMode ? '☀️' : '🌙';
}
function toggleDark() {
  darkMode = !darkMode;
  localStorage.setItem('dark_mode', darkMode ? '1' : '0');
  applyDark();
}
applyDark();

function renderList() {
  const q = document.getElementById('search').value.toLowerCase();
  let filtered = notes.filter(n => {
    const matchTag = !activeTag || n.tags.includes(activeTag);
    const matchQ = !q || n.title.toLowerCase().includes(q) || n.tags.some(t => t.toLowerCase().includes(q));
    return matchTag && matchQ;
  });

  const list = document.getElementById('note-list');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="text-4xl mb-2">🔍</div><div>沒有符合的筆記</div></div>`;
  } else {
    list.innerHTML = filtered.map(n => {
      if (selectionMode) {
        return `
          <div class="note-card p-3 mb-1 rounded-lg hover:bg-blue-50 transition flex items-start gap-2"
               onclick="toggleSelection('${n.id}', event)"
            >
            <input type="checkbox" id="chk-${n.id}" ${selectedIds.has(n.id)?'checked':''} class="mt-0.5" onchange="toggleSelection('${n.id}', event)" onclick="event.stopPropagation()">
            <div class="flex-1 min-w-0">
              <div class="font-medium text-gray-800 text-sm truncate">${escHtml(n.title)}</div>
              <div class="text-xs text-gray-400 mt-0.5">${formatDate(n.updatedAt)}</div>
              ${n.tags.length ? `<div class="mt-1">${n.tags.map(t=>`<span class="tag">${escHtml(t)}</span>`).join('')}</div>` : ''}
            </div>
          </div>`;
      } else {
        return `
          <div class="note-card p-3 mb-1 rounded-lg cursor-pointer hover:bg-blue-50 transition ${n.id===currentId?'active':''}"
               onclick="selectNote('${n.id}')"
            >
            <div class="font-medium text-gray-800 text-sm truncate">${escHtml(n.title)}</div>
            <div class="text-xs text-gray-400 mt-0.5">${formatDate(n.updatedAt)}</div>
            ${n.tags.length ? `<div class="mt-1">${n.tags.map(t=>`<span class="tag">${escHtml(t)}</span>`).join('')}</div>` : ''}
          </div>`;
      }
    }).join('');
  }
  renderTagBar();
  document.getElementById('stats').textContent = `共 ${notes.length} 篇筆記`;
  if (selectionMode) updateSelectionCount();
}

function renderTagBar() {
  const allTags = [...new Set(notes.flatMap(n => n.tags))];
  const bar = document.getElementById('tag-bar');
  if (!allTags.length) { bar.innerHTML = '<span class="text-xs text-gray-300">無標籤</span>'; return; }
  bar.innerHTML = `
    <span class="tag cursor-pointer ${!activeTag?'!bg-blue-500 !text-white':''}" onclick="filterTag(null)">全部</span>
    ${allTags.map(t => `<span class="tag cursor-pointer ${activeTag===t?'!bg-blue-500 !text-white':''}" onclick="filterTag('${escAttr(t)}')"
      >${escHtml(t)}</span>`).join('')}`;
}

function filterTag(tag) { activeTag = tag; renderList(); }

function enterSelectionMode() {
  selectionMode = true;
  selectedIds.clear();
  document.getElementById('mode-buttons').classList.add('hidden');
  document.getElementById('selection-controls').classList.remove('hidden');
  renderList();
}

function exitSelectionMode() {
  selectionMode = false;
  selectedIds.clear();
  document.getElementById('selection-controls').classList.add('hidden');
  document.getElementById('mode-buttons').classList.remove('hidden');
  renderList();
}

function toggleSelection(id, event) {
  if (event) event.stopPropagation();
  if (selectedIds.has(id)) {
    selectedIds.delete(id);
  } else {
    selectedIds.add(id);
  }
  const checkbox = document.getElementById(`chk-${id}`);
  if (checkbox) checkbox.checked = selectedIds.has(id);
  updateSelectionCount();
}

function selectAll() {
  const q = document.getElementById('search').value.toLowerCase();
  let filtered = notes.filter(n => {
    const matchTag = !activeTag || n.tags.includes(activeTag);
    const matchQ = !q || n.title.toLowerCase().includes(q) || n.tags.some(t => t.toLowerCase().includes(q));
    return matchTag && matchQ;
  });
  filtered.forEach(n => selectedIds.add(n.id));
  renderList();
}

function deselectAll() {
  selectedIds.clear();
  renderList();
}

function updateSelectionCount() {
  document.getElementById('selection-count').textContent = `已選 ${selectedIds.size} 篇`;
}

function bulkExport() {
  if (!selectedIds.size) { alert('請先選擇要匯出的筆記'); return; }
  const toExport = notes.filter(n => selectedIds.has(n.id));
  if (!toExport.length) {
    alert('選取的筆記無法匯出，請確認選取狀態');
    console.log('Selected IDs:', Array.from(selectedIds));
    console.log('Available Note IDs:', notes.map(n => n.id));
    return;
  }
  const payload = {
    version: 1,
    exportedAt: new Date().toISOString(),
    count: toExport.length,
    notes: toExport
  };
  const json = JSON.stringify(payload, null, 2);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = URL.createObjectURL(new Blob([json], { type: 'application/json' }));
  a.download = `html-notes-batch-${date}.json`;
  a.click();
  const exportedCount = toExport.length;
  selectedIds.clear();
  renderList();
  alert(`✓ 已匯出 ${exportedCount} 篇筆記`);
}

function bulkDelete() {
  if (!selectedIds.size) { alert('請先選擇要刪除的筆記'); return; }
  if (!confirm(`確定要刪除 ${selectedIds.size} 篇筆記嗎?此操作無法復原。`)) return;
  const count = selectedIds.size;
  notes = notes.filter(n => !selectedIds.has(n.id));
  currentId = null;
  save();
  selectedIds.clear();
  renderList();
  document.getElementById('preview-bar').classList.add('hidden');
  document.getElementById('preview-frame').classList.add('hidden');
  document.getElementById('empty-main').classList.remove('hidden');
  alert(`✓ 已刪除 ${count} 篇筆記`);
}

function selectNote(id) {
  if (selectionMode) return;
  currentId = id;
  const note = notes.find(n => n.id === id);
  if (!note) return;

  document.getElementById('empty-main').classList.add('hidden');
  const frame = document.getElementById('preview-frame');
  frame.classList.remove('hidden');
  frame.classList.add('flex-1');

  const blob = new Blob([note.html], { type: 'text/html' });
  frame.src = URL.createObjectURL(blob);

  document.getElementById('preview-bar').classList.remove('hidden');
  document.getElementById('preview-title').textContent = note.title;

  renderList();
  if (window.innerWidth < 768) toggleSidebar(false);
}

function openAddModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = '新增筆記';
  document.getElementById('m-title').value = '';
  document.getElementById('m-tags').value = '';
  document.getElementById('m-html').value = '';
  document.getElementById('modal').classList.add('show');
}

function editCurrentNote() {
  if (!currentId) return;
  const note = notes.find(n => n.id === currentId);
  if (!note) return;
  editingId = currentId;
  document.getElementById('modal-title').textContent = '編輯筆記';
  document.getElementById('m-title').value = note.title;
  document.getElementById('m-tags').value = note.tags.join(', ');
  document.getElementById('m-html').value = note.html;
  document.getElementById('modal').classList.add('show');
}

function closeModal() { document.getElementById('modal').classList.remove('show'); }

function saveNote() {
  const title = document.getElementById('m-title').value.trim();
  const html  = document.getElementById('m-html').value.trim();
  if (!title) { alert('請輸入標題'); return; }
  if (!html)  { alert('請輸入 HTML 內容'); return; }
  const tags = document.getElementById('m-tags').value
    .split(',').map(t => t.trim()).filter(Boolean);

  if (editingId) {
    const idx = notes.findIndex(n => n.id === editingId);
    notes[idx] = { ...notes[idx], title, html, tags, updatedAt: Date.now() };
  } else {
    notes.unshift({ id: genId(), title, html, tags, createdAt: Date.now(), updatedAt: Date.now() });
  }
  save(); renderList(); closeModal();
  if (editingId) selectNote(editingId);
}

function deleteCurrentNote() {
  if (!currentId) return;
  const note = notes.find(n => n.id === currentId);
  if (!confirm(`確定要刪除「${note.title}」嗎？`)) return;
  notes = notes.filter(n => n.id !== currentId);
  currentId = null;
  save(); renderList();
  document.getElementById('preview-bar').classList.add('hidden');
  document.getElementById('preview-frame').classList.add('hidden');
  document.getElementById('empty-main').classList.remove('hidden');
}

function exportCurrentNote() {
  if (!currentId) return;
  const note = notes.find(n => n.id === currentId);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([note.html], { type: 'text/html' }));
  a.download = note.title.replace(/[\\/\\?%*:|"<>]/g, '_') + '.html';
  a.click();
}

function exportAll() {
  if (!notes.length) { alert('目前沒有任何筆記可備份'); return; }
  const payload = {
    version: 1,
    exportedAt: new Date().toISOString(),
    count: notes.length,
    notes
  };
  const json = JSON.stringify(payload, null, 2);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = URL.createObjectURL(new Blob([json], { type: 'application/json' }));
  a.download = `html-notes-backup-${date}.json`;
  a.click();
  const btn = document.querySelector('[onclick="exportAll()"]');
  const orig = btn.textContent;
  btn.textContent = '✅ 已備份';
  setTimeout(() => btn.textContent = orig, 2000);
}

function importBackup(input) {
  const file = input.files?.[0];
  if (!file) { input.value = ''; return; }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const content = e.target?.result;
      if (!content || typeof content !== 'string') throw new Error('讀取失敗');
      const jsonStr = content.replace(/^\ufeff/, '').trim();
      const data = JSON.parse(jsonStr);
      if (!data.notes || !Array.isArray(data.notes)) throw new Error('格式錯誤');
      const count = data.notes.length;
      const action = confirm(`備份檔案 ${count} 篇筆記\n\n合併到現有筆記？`);
      if (!action) { input.value = ''; return; }
      const existingIds = new Set(notes.map(n => n.id));
      let imported = 0;
      data.notes.forEach(n => {
        if (n.id && !existingIds.has(n.id) && n.title && n.html) {
          notes.unshift(n);
          imported++;
        }
      });
      save(); renderList(); input.value = '';
      alert(`✓ 完成!\n新增 ${imported} 篇\n重複 ${count - imported} 篇`);
    } catch(err) {
      console.error(err);
      alert('備份檔案格式錯誤\n請選擇本工具匯出的 .json 檔');
      input.value = '';
    }
  };
  reader.onerror = () => { alert('檔案讀取失敗'); input.value = ''; };
  reader.readAsText(file, 'UTF-8');
}

function importFiles(input) {
  const files = Array.from(input.files || []);
  const existingTitles = new Set(notes.map(n => n.title));
  let count = 0;
  let skipped = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const title = file.name.replace(/\.html?$/i, '');
      if (!existingTitles.has(title)) {
        notes.unshift({ id: genId(), title, html: e.target.result, tags: [], createdAt: Date.now(), updatedAt: Date.now() });
        count++;
      } else {
        skipped++;
      }
      if (count + skipped === files.length) {
        save(); renderList();
        if (skipped > 0) alert(`✓ 匯入完成!\n新增 ${count} 篇\n重複 ${skipped} 篇`);
      }
    };
    reader.readAsText(file, 'UTF-8');
  });
  input.value = '';
}

const dz = document.getElementById('drop-zone');
document.addEventListener('dragenter', e => { if ([...e.dataTransfer.types].includes('Files')) dz.classList.remove('hidden'); });
dz.addEventListener('dragleave', () => dz.classList.add('hidden'));
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.add('hidden'); dz.classList.remove('dragover');
  const fakeInput = { files: [...e.dataTransfer.files].filter(f => f.name.match(/\.html?$/i)) };
  if (fakeInput.files.length) importFiles(fakeInput);
});

function toggleSidebar(forceClose) {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('overlay');
  const open = typeof forceClose === 'boolean' ? !forceClose : !sb.classList.contains('open');
  sb.classList.toggle('open', open);
  ov.classList.toggle('show', open);
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return s.replace(/'/g,"\\'" ); }
function formatDate(ts) {
  const d = new Date(ts), now = new Date();
  if (d.toDateString() === now.toDateString()) return '今天 ' + d.toTimeString().slice(0,5);
  const diff = (now - d) / 86400000;
  if (diff < 7) return Math.floor(diff) + ' 天前';
  return d.toLocaleDateString('zh-TW', { month:'short', day:'numeric' });
}

renderList();

<script>window.parent.postMessage({ action: "ready" }, "*"); 
 
window.console = new Proxy(console, {
  get(target, prop) {
    if (['log', 'warn', 'error'].includes(prop)) {
      return new Proxy(target[prop], {
        apply(fn, thisArg, args) {
          fn.apply(thisArg, args);
          window.parent.postMessage({ action: 'console', 
            type: prop, 
            args: args.map((arg) => {
              try {
                return JSON.stringify(arg).replace(/^["']|["']$/g, '');
              } catch (e) {
                return arg;
              }
            }) 
          }, '*');
        }
      });
    }
    return target[prop];
  }
});
